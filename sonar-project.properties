# BẮT BUỘC: Định danh duy nhất cho dự án của bạn trên SonarQube.
# Đảm bảo nó là duy nhất trên SonarQube Server của bạn.
sonar.projectKey=my_netbean_swp_project

# Tên hiển thị trên SonarQube UI
sonar.projectName=SWP NetBeans Web Project

# Phiên bản của dự án
sonar.projectVersion=1.0

# Đường dẫn tương đối đến thư mục gốc của dự án (nơi file sonar-project.properties này được đặt)
# Dấu chấm (.) chỉ ra rằng mã nguồn nằm trong thư mục hiện tại và các thư mục con
sonar.sources=.

# =========================================================================
# CẤU HÌNH CHO MÃ NGUỒN JAVA
# =========================================================================
sonar.java.source=17 # Đặt phiên bản Java bạn đang sử dụng (ví dụ: 8, 11, 17)
sonar.java.target=17 # Phiên bản target của JVM
sonar.java.binaries=build/web/WEB-INF/classes
sonar.java.libraries=build/web/WEB-INF/lib/*.jar

# =========================================================================
# CẤU HÌNH CHO TÀI NGUYÊN WEB (JSP, HTML, CSS, JS)
# =========================================================================
# Các phần mở rộng file web bạn muốn phân tích
sonar.web.fileExtensions=jsp,html,css,js

# Đường dẫn đến thư mục chứa các tài nguyên web của bạn (JSP, HTML, CSS, JS).
sonar.web.resources=web

# =========================================================================
# CÁC CẤU HÌNH CHUNG KHÁC
# =========================================================================
# Encoding của mã nguồn
sonar.sourceEncoding=UTF-8

# Địa chỉ SonarQube Server
sonar.host.url=http://localhost:9000

# Token xác thực (thay cho sonar.login, là cấu hình mới hơn và khuyến nghị)
sonar.token=sqa_ad2643e81fed774271b6cae8f9fe3f694e32d8a0